# Build and publish the documentation
# based in part on https://github.com/sandialabs/firewheel/blob/main/.github/workflows/documentation.yml
name: Documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  docs:
    name: Build documentation (HTML)
    runs-on: ubuntu-24.04
    steps:
      # This will block outbound connections that aren't explictly allowed
      # If this causes a pipeline to fail, investigate what endpoints were blocked.
      # If they are legitimate, then change to audit mode, run pipeline and collect
      # endpoints from StepSecurity report, update list of endpoints, then change back
      # to "block".
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: block
          allowed-endpoints: >
            files.pythonhosted.org:443
            github.com:443
            pdm-project.org:443
            pdm.fming.dev:443
            pypi.org:443
            raw.githubusercontent.com:443
            azure.archive.ubuntu.com:80
            esm.ubuntu.com:443
            motd.ubuntu.com:443
            packages.microsoft.com:443
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
            fetch-tags: true
            fetch-depth: 0  # checkout full history
      # NOTE: awalsh128/cache-apt-pkgs-action was failing with cache failures
      - name: Install Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends graphviz
          dot -V
      - name: Setup PDM
        uses: pdm-project/setup-pdm@v4
        with:
          python-version: "3.12"
          cache: true
      - name: Install dependencies
        run: pdm sync -d --clean
      - name: Update dependencies doc pages
        run: pdm run dep-doc
      - name: Build docs
        run: pdm run docs-html
      - uses: actions/upload-pages-artifact@v4
        with:
          path: _docs_html/
  deploy:
    name: Publish docs to GitHub Pages
    runs-on: ubuntu-latest
    needs: docs
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
